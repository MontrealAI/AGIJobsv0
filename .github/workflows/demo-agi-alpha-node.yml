name: Demo AGI Alpha Node

on:
  pull_request:
    paths:
      - 'demo/AGI-Alpha-Node-v0/**'
  push:
    branches:
      - main
    paths:
      - 'demo/AGI-Alpha-Node-v0/**'

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run demo tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest demo/AGI-Alpha-Node-v0/tests
