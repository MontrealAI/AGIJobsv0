name: demo-muzero-style

on:
  push:
    branches: [main]
    paths:
      - 'demo/MuZero-style-v0/**'
      - '.github/workflows/demo-muzero-style.yml'
  pull_request:
    paths:
      - 'demo/MuZero-style-v0/**'
      - '.github/workflows/demo-muzero-style.yml'

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.1.2
          pip install -r requirements-python.txt
          pip install -r demo/MuZero-style-v0/requirements.txt
      - name: Run MuZero demo tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
          PYTHONPATH: demo/MuZero-style-v0
        run: |
          pytest demo/MuZero-style-v0/tests -q
