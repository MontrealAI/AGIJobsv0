name: demo-sovereign-constellation

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    paths:
      - demo/sovereign-constellation/**
      - .github/workflows/demo-sovereign-constellation.yml
      - package.json
      - package-lock.json

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: ./scripts/ci/npm-ci.sh --no-audit --prefer-offline --progress=false
      - name: Sovereign Constellation CI
        run: npm run demo:sovereign-constellation:ci
