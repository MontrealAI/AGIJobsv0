name: demo-cosmic-flagship

on:
  pull_request:
    paths:
      - 'demo/cosmic-omni-sovereign-symphony/**'
      - 'scripts/v2/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/demo-cosmic-flagship.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flagship-dry-run:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Harden runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com
            github.com
            objects.githubusercontent.com
            raw.githubusercontent.com
            actions.githubusercontent.com
            actions-results.githubusercontent.com
            pipelines.actions.githubusercontent.com
            registry.npmjs.org
            nodejs.org
            binaries.soliditylang.org
            codeload.github.com

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Execute flagship demo (dry run)
        run: bash demo/cosmic-omni-sovereign-symphony/bin/flagship-demo.sh --ci --dry-run

      - name: Upload flagship artefacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cosmic-flagship-demo
          path: |
            demo/cosmic-omni-sovereign-symphony/logs/flagship-demo/**
            demo/cosmic-omni-sovereign-symphony/logs/ledger-latest.json
            demo/cosmic-omni-sovereign-symphony/logs/vote-simulation.json
            reports/agi-os/**
          if-no-files-found: ignore
