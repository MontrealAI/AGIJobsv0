name: webapp

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: write

concurrency:
  group: webapp-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webapp-ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Preflight toolchain locks
        run: npm run ci:preflight

      - name: Install repository dependencies
        run: ./scripts/ci/npm-ci.sh

      - name: Install console dependencies
        run: NPM_CI_PROJECT_ROOT=apps/console ./scripts/ci/npm-ci.sh --prefix apps/console

      - name: Install enterprise portal dependencies
        run: NPM_CI_PROJECT_ROOT=apps/enterprise-portal ./scripts/ci/npm-ci.sh --prefix apps/enterprise-portal

      - name: Type-check webapp
        run: npm run webapp:typecheck

      - name: Lint webapp
        run: npm run webapp:lint

      - name: Owner console build
        run: npm run webapp:build

      - name: Webapp build
        run: npm --prefix apps/enterprise-portal run build

      - name: Cypress E2E
        env:
          TERM: xterm
          CYPRESS_CACHE_FOLDER: ~/.cache/Cypress
        run: npm run webapp:e2e

      - name: Upload webapp artefacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: owner-console-dist
          path: apps/console/dist
