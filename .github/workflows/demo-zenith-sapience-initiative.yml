name: demo-zenith-sapience-initiative

on:
  pull_request:
    paths:
      - 'demo/zenith-sapience-initiative-global-governance/**'
      - 'scripts/v2/asiGlobalDemo.ts'
      - 'scripts/v2/asiGlobalKit.ts'
      - 'scripts/v2/lib/asiTakeoffKit.ts'
      - 'package.json'
      - '.github/workflows/demo-zenith-sapience-initiative.yml'
  push:
    branches: [main]
    paths:
      - 'demo/zenith-sapience-initiative-global-governance/**'
      - 'scripts/v2/asiGlobalDemo.ts'
      - 'scripts/v2/asiGlobalKit.ts'
      - 'scripts/v2/lib/asiTakeoffKit.ts'
      - 'package.json'
      - '.github/workflows/demo-zenith-sapience-initiative.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  zenith-sapience:
    name: Zenith Sapience Initiative Demo
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Harden runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com
            github.com
            codeload.github.com
            uploads.github.com
            release-assets.githubusercontent.com
            objects.githubusercontent.com
            raw.githubusercontent.com
            actions.githubusercontent.com
            actions-results.githubusercontent.com
            pipelines.actions.githubusercontent.com
            registry.npmjs.org
            nodejs.org

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: ./scripts/ci/npm-ci.sh

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@50d5a8956f2e319df19e6b57539d7e2acb9f8c1e
        with:
          version: 'v1.4.4'

      - name: Run Zenith Sapience deterministic kit
        run: npm run demo:zenith-sapience-initiative

      - name: Run Zenith Sapience local rehearsal
        env:
          RPC_URL: http://127.0.0.1:8545
          CHAIN_ID: '31337'
        run: npm run demo:zenith-sapience-initiative:local

      - name: Upload Zenith Sapience artefacts
        if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: zenith-sapience-reports
          path: |
            reports/zenith-sapience/**
            reports/localhost/zenith-sapience/**
